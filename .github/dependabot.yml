version: 2
updates:
  # PHP Composer dependencies
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:00"
    open-pull-requests-limit: 5
    assignees:
      - "KirilKurkianec"
      - "DonatasJabl"
    commit-message:
      prefix: "composer"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: 'dependencies'

  # NPM dependencies (Laravel Mix, frontend assets)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "13:00"
    open-pull-requests-limit: 5
    assignees:
      - "KirilKurkianec"
      - "DonatasJabl"
    commit-message:
      prefix: "npm"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: 'dependencies'

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "13:00"
    open-pull-requests-limit: 3
    assignees:
      - "KirilKurkianec"
    commit-message:
      prefix: "github-actions"
      include: "scope"
    target-branch: 'dependencies'

  # Docker dependencies - PHP-FPM images
  - package-ecosystem: "docker"
    directory: "/docker/php-fpm"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "13:00"
    open-pull-requests-limit: 3
    assignees:
      - "KirilKurkianec"
      - "DonatasJabl"
    commit-message:
      prefix: "docker"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: 'dependencies'

  # Docker dependencies - Nginx images
  - package-ecosystem: "docker"
    directory: "/docker/nginx"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "13:00"
    open-pull-requests-limit: 3
    assignees:
      - "KirilKurkianec"
      - "DonatasJabl"
    commit-message:
      prefix: "docker"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: 'dependencies'

  # Docker Compose dependencies - root Compose images
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "13:00"
    open-pull-requests-limit: 3
    assignees:
      - "KirilKurkianec"
      - "DonatasJabl"
    commit-message:
      prefix: "docker"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: 'dependencies'
