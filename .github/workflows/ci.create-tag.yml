name: "CI: Create release tag"

run-name: "Release ${{ inputs.tag_name || github.ref_name }} by @${{ github.actor }}"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag (SemVer, for example v1.2.3)"
        required: true
        type: string
      release_description:
        description: "Why is this tag/release being created?"
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: create-release-tag
  cancel-in-progress: false

jobs:
  create-release:
    name: Create tag and GitHub Release
    if: github.event_name != 'push' || github.event.deleted == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || 'main' }}
          fetch-depth: 0

      - name: Validate release input
        id: validate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          RELEASE_DESCRIPTION: ${{ inputs.release_description }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Tag must contain only a v prefix and three numbers, for example v1.2.3."
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -z "${RELEASE_DESCRIPTION//[[:space:]]/}" ]]; then
            echo "::error::Release description must explain why the tag is being created."
            exit 1
          fi

          tag_exists=false
          release_sha="$(git rev-parse HEAD)"

          if git show-ref --verify --quiet "refs/tags/${TAG_NAME}"; then
            tag_exists=true
            release_sha="$(git rev-list -n 1 "$TAG_NAME")"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            echo "::error::Pushed tag ${TAG_NAME} could not be checked out."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error::Release ${TAG_NAME} already exists."
            exit 1
          fi

          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build website
        run: npm run build

      - name: Install PDF browser
        run: npx playwright install --with-deps chromium

      - name: Build PDF
        run: npm run build:pdf

      - name: Create tag and release with generated changelog
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          TAG_EXISTS: ${{ steps.validate.outputs.tag_exists }}
          RELEASE_DESCRIPTION: ${{ inputs.release_description }}
          RELEASE_SHA: ${{ steps.validate.outputs.release_sha }}
        run: |
          set -euo pipefail

          source_flags=(--target "$RELEASE_SHA")
          if [[ "$EVENT_NAME" == "push" || "$TAG_EXISTS" == "true" ]]; then
            source_flags=(--verify-tag)
          fi

          notes_flags=()
          if [[ -n "${RELEASE_DESCRIPTION//[[:space:]]/}" ]]; then
            printf '%s\n\n' "$RELEASE_DESCRIPTION" > release-notes.md
          else
            : > release-notes.md
          fi

          previous_tag=""
          while IFS= read -r candidate; do
            if [[ "$candidate" != "$TAG_NAME" \
              && "$candidate" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] \
              && git merge-base --is-ancestor "$candidate" "$RELEASE_SHA"; then
              previous_tag="$candidate"
              break
            fi
          done < <(git tag --sort=-version:refname)

          commit_range="$RELEASE_SHA"
          if [[ -n "$previous_tag" ]]; then
            commit_range="${previous_tag}..${RELEASE_SHA}"
          fi

          printf '## Changes\n\n' >> release-notes.md
          commit_count=0
          while IFS=$'\t' read -r commit_sha short_sha subject; do
            printf -- '- %s ([`%s`](%s/%s/commit/%s))\n' \
              "$subject" "$short_sha" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$commit_sha" \
              >> release-notes.md
            commit_count=$((commit_count + 1))
          done < <(git log --no-merges --pretty=tformat:'%H%x09%h%x09%s' "$commit_range")

          if [[ "$commit_count" -eq 0 ]]; then
            echo "::error::No commits found for release ${TAG_NAME}."
            exit 1
          fi

          notes_flags=(--notes-file release-notes.md)

          gh release create "$TAG_NAME" \
            "artifacts/dev-standard.pdf#Programinės įrangos kūrimo standartas (${TAG_NAME})" \
            --title "$TAG_NAME" \
            --generate-notes \
            --latest \
            "${source_flags[@]}" \
            "${notes_flags[@]}"

      - name: Trigger release deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: gh workflow run cd.deploy.yml --ref main --field tag_name="$TAG_NAME"
